{% extends 'admin/base.html' %}
{% block title %}{{ 'Editar' if category else 'Nova' }} categoria{% endblock %}
{% block content %}
<div class="mb-4">
    <h1 class="h3 mb-1">{{ 'Editar' if category else 'Nova' }} categoria</h1>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nome</label>
                <input class="form-control" name="name" value="{{ category.name if category else '' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Imagem</label>
                <input type="file" class="form-control" name="image" accept=".png,.jpg,.jpeg,.webp,.svg">
            </div>
            <div class="col-12">
                <label class="form-label">Descrição</label>
                <textarea class="form-control" rows="4" name="description">{{ category.description if category else '' }}</textarea>
            </div>
            <div class="col-12 form-check ms-2">
                <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if not category or category.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active">Categoria ativa</label>
            </div>
            <div class="col-12 d-flex justify-content-end gap-2">
                <a href="{{ url_for('admin_categories') }}" class="btn btn-outline-dark">Cancelar</a>
                <button class="btn btn-primary-custom">Salvar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
