<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login do painel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="login-card card shadow-sm border-0">
        <div class="card-body p-4 p-lg-5">
            <h1 class="h3 mb-3">Painel administrativo</h1>
            <p class="text-muted">Entre para gerenciar o site.</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category if category in ['success', 'danger', 'warning', 'info'] else 'secondary' }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="post" class="d-grid gap-3 mt-4">
                <div>
                    <label class="form-label">Usuário</label>
                    <input class="form-control" name="username" required>
                </div>
                <div>
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <button class="btn btn-primary-custom">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
